<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Phát Âm Tiếng Anh - Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.4);
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15), 0 1px 3px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 550px;
            width: 100%;
            transition: all 0.3s ease;
        }

        h1 {
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }

        /* Badge độ khó cao cấp */
        .badge {
            display: inline-block;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .badge-easy { background-color: #e2fbd7; color: #10b981; }
        .badge-medium { background-color: #fff8e1; color: #f59e0b; }
        .badge-hard { background-color: #ffebee; color: #ef4444; }

        /* Khung hiển thị câu nói */
        .phrase-box {
            font-size: 24px;
            font-weight: 600;
            color: #312e81;
            background: #f8fafc;
            padding: 30px 25px;
            border-radius: 16px;
            margin-bottom: 25px;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
            border: 2px solid #e2e8f0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            position: relative;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        /* Thiết kế nút bấm chuyển động */
        button {
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
        }

        #startBtn { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%); 
            position: relative;
        }
        #startBtn:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 10px 25px var(--success-glow);
        }
        #startBtn:active { transform: translateY(-1px); }

        /* Hiệu ứng Radar Sóng Quét khi đang ghi âm */
        #startBtn.listening {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
            animation: pulse 1.5s infinite;
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        }

        #nextBtn { 
            background: linear-gradient(135deg, #4f46e5 0%, #3730a3 100%); 
            display: none; 
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        #nextBtn:hover { 
            background: linear-gradient(135deg, #4338ca 0%, #2e2685 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);
        }

        button:disabled {
            background: #cbd5e1 !important;
            color: #94a3b8 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Hiệu ứng Sóng âm giả lập (Audio Wave) */
        .wave-container {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 30px;
            margin-bottom: 20px;
        }
        .wave-bar {
            width: 4px;
            height: 10px;
            background-color: var(--danger);
            border-radius: 4px;
            animation: bounce 0.8s ease-in-out infinite alternate;
        }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; height: 20px; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; height: 25px; }
        .wave-bar:nth-child(4) { animation-delay: 0.1s; height: 15px; }
        .wave-bar:nth-child(5) { animation-delay: 0.3s; height: 20px; }

        /* Khung kết quả mượt mà */
        .result-box {
            margin-top: 30px;
            text-align: left;
            border-top: 2px dashed #e2e8f0;
            padding-top: 25px;
            animation: fadeIn 0.5s ease forwards;
            display: none;
        }

        .score-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .score {
            font-size: 56px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 5px;
            transition: all 0.5s ease;
        }

        /* Phát quang màu điểm số */
        .good { color: var(--success); text-shadow: 0 0 20px var(--success-glow); }
        .average { color: var(--warning); text-shadow: 0 0 20px rgba(245, 158, 11, 0.4); }
        .bad { color: var(--danger); text-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }

        /* Các hiệu ứng Animation chính */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 18px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @keyframes bounce {
            100% { height: 30px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phát Âm Ngẫu Nhiên</h1>
    <div class="subtitle">Thử thách cơ miệng với AI nhận diện giọng Anh-Mỹ</div>
    
    <div id="difficultyBadge" class="badge">Đang tải...</div>
    <div class="phrase-box" id="targetPhrase">Đang chuẩn bị câu hỏi...</div>
    
    <div class="wave-container" id="waveVisualizer">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
    </div>

    <div class="btn-group">
        <button id="startBtn">Bắt đầu nói</button>
        <button id="nextBtn">Câu tiếp theo ➜</button>
    </div>
    
    <div class="result-box" id="resultArea">
        <p><strong>Bạn đã nói:</strong> <span id="userTranscript" style="color: #475569; font-style: italic;">...</span></p>
        <p><strong>Đánh giá:</strong> <span id="matchResult" style="font-weight: 500; color: #334155;">...</span></p>
        <div class="score-container">
            <div class="score" id="finalScore">0%</div>
        </div>
    </div>
</div>

<script>
    const dataset = [
        { text: "Hello, how are you today?", level: "easy" },
        { text: "I like to drink hot coffee in the morning.", level: "easy" },
        { text: "The cat is sleeping on the comfortable mat.", level: "easy" },
        { text: "Beautiful weather we are having today.", level: "medium" },
        { text: "Could you please tell me the way to the train station?", level: "medium" },
        { text: "Practice makes perfect when learning a new language.", level: "medium" },
        { text: "I would like to schedule an appointment for next week.", level: "medium" },
        { text: "Peter Piper picked a peck of pickled peppers.", level: "hard" },
        { text: "The entrepreneurial strategy yielded incredible global results.", level: "hard" },
        { text: "She sells seashells by the seashore.", level: "hard" }
    ];

    let orderList = [];
    let currentPointer = 0;
    let currentPhraseIndex = 0;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng sử dụng Google Chrome!");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        const targetPhrase = document.getElementById('targetPhrase');
        const difficultyBadge = document.getElementById('difficultyBadge');
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resultArea = document.getElementById('resultArea');
        const userTranscript = document.getElementById('userTranscript');
        const matchResult = document.getElementById('matchResult');
        const finalScore = document.getElementById('finalScore');
        const waveVisualizer = document.getElementById('waveVisualizer');

        function generateRandomOrder() {
            orderList = [...Array(dataset.length).keys()];
            for (let i = orderList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [orderList[i], orderList[j]] = [orderList[j], orderList[i]];
            }
            currentPointer = 0;
        }

        function loadPhrase() {
            currentPhraseIndex = orderList[currentPointer];
            const item = dataset[currentPhraseIndex];
            
            targetPhrase.innerText = item.text;
            difficultyBadge.innerText = item.level;
            difficultyBadge.className = "badge badge-" + item.level;
            
            resultArea.style.display = "none";
            nextBtn.style.display = "none";
            waveVisualizer.style.display = "none";
            startBtn.disabled = false;
            startBtn.className = ""; // Xóa class phụ nếu có
        }

        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.innerText = "Hệ thống đang nghe...";
            startBtn.classList.add('listening'); // Kích hoạt hiệu ứng Radar đỏ phát sáng
            waveVisualizer.style.display = "flex"; // Hiện sóng âm nhấp nhô
            resultArea.style.display = "none";
        });

        recognition.onresult = (event) => {
            const speechResult = event.results[0][0].transcript;
            const confidence = event.results[0][0].confidence; 

            userTranscript.innerText = speechResult;
            
            const cleanTarget = cleanText(dataset[currentPhraseIndex].text);
            const cleanSpeech = cleanText(speechResult);

            const score = calculateScore(cleanTarget, cleanSpeech, confidence);
            displayResults(score);
        };

        recognition.onspeechend = () => {
            recognition.stop();
            startBtn.innerText = "Bắt đầu nói";
            startBtn.classList.remove('listening');
            waveVisualizer.style.display = "none";
        };

        recognition.onerror = (event) => {
            alert("Lỗi thu âm hoặc không nhận diện được âm thanh. Hãy thử lại!");
            startBtn.innerText = "Bắt đầu nói";
            startBtn.classList.remove('listening');
            waveVisualizer.style.display = "none";
            startBtn.disabled = false;
        };

        nextBtn.addEventListener('click', () => {
            currentPointer++;
            if (currentPointer >= dataset.length) {
                alert("🎉 Xuất sắc! Bạn đã vượt qua toàn bộ 10 câu hỏi ngẫu nhiên!");
                generateRandomOrder();
            }
            loadPhrase();
        });

        function cleanText(text) {
            return text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
        }

        function calculateScore(target, speech, confidence) {
            const targetWords = target.split(' ');
            const speechWords = speech.split(' ');
            
            let matchedCount = 0;
            targetWords.forEach(word => {
                if (speechWords.includes(word)) matchedCount++;
            });

            const wordMatchRatio = matchedCount / targetWords.length;
            let finalScore = (wordMatchRatio * 0.6 + confidence * 0.4) * 100;
            
            if (speech === "") finalScore = 0;
            return Math.min(Math.max(Math.round(finalScore), 0), 100);
        }

        function displayResults(score) {
            resultArea.style.display = "block";
            finalScore.innerText = score + "%";
            finalScore.className = "score"; 

            if (score >= 85) {
                finalScore.classList.add('good');
                matchResult.innerText = "🥳 Tuyệt vời! Giọng đọc cực chuẩn Mỹ, tiếp tục phát huy nhé!";
            } else if (score >= 60) {
                finalScore.classList.add('average');
                matchResult.innerText = "👍 Khá tốt, chú ý nhấn rõ âm đuôi (ending sounds) và các từ nối.";
            } else {
                finalScore.classList.add('bad');
                matchResult.innerText = "😢 Chưa chính xác lắm. Bạn nên nghe kỹ câu mẫu, đọc chậm và rõ chữ hơn.";
            }

            nextBtn.style.display = "inline-block";
            startBtn.disabled = true; 
        }

        generateRandomOrder();
        loadPhrase();
    }
</script>

</body>
</html>
