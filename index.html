<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Phát Âm Tiếng Anh - Random Challenge</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 550px;
            width: 100%;
        }
        h1 {
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 26px;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .badge {
            display: inline-block;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge-easy { background-color: #e2fbd7; color: #34a853; }
        .badge-medium { background-color: #fff8e1; color: #b78103; }
        .badge-hard { background-color: #ffebee; color: #c62828; }

        .phrase-box {
            font-size: 24px;
            font-weight: 600;
            color: #1d4ed8;
            background-color: #eff6ff;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            border: 1px solid #dbeafe;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 10px;
            min-height: 50px;
        }
        button {
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        #startBtn { background-color: #10b981; }
        #startBtn:hover { background-color: #059669; transform: translateY(-1px); }
        #nextBtn { background-color: #3b82f6; display: none; } /* Mặc định ẩn nút này */
        #nextBtn:hover { background-color: #2563eb; transform: translateY(-1px); }
        
        button:disabled {
            background-color: #94a3b8 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }
        .result-box {
            margin-top: 30px;
            text-align: left;
            border-top: 2px dashed #e2e8f0;
            padding-top: 25px;
            animation: fadeIn 0.4s ease;
        }
        .score {
            font-size: 40px;
            font-weight: 800;
            text-align: center;
            margin-top: 15px;
        }
        .good { color: #10b981; }
        .average { color: #f59e0b; }
        .bad { color: #ef4444; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Thử Thách Phát Âm Ngẫu Nhiên</h1>
    <div class="subtitle">Hệ thống sẽ chọn câu ngẫu nhiên. Hãy đọc thật chuẩn chỉnh nhé!</div>
    
    <div id="difficultyBadge" class="badge">Đang tải...</div>
    <div class="phrase-box" id="targetPhrase">Đang chuẩn bị câu hỏi...</div>
    
    <div class="btn-group">
        <button id="startBtn">Bắt đầu nói</button>
        <button id="nextBtn">Câu tiếp theo ➜</button>
    </div>
    
    <div class="result-box" id="resultArea">
        <p><strong>Bạn đã nói:</strong> <span id="userTranscript" style="color: #475569; font-style: italic;">...</span></p>
        <p><strong>Đánh giá:</strong> <span id="matchResult">...</span></p>
        <div class="score" id="finalScore">0%</div>
    </div>
</div>

<script>
    // Kho dữ liệu 10 câu gốc
    const dataset = [
        { text: "Hello, how are you today?", level: "easy" },
        { text: "I like to drink hot coffee in the morning.", level: "easy" },
        { text: "The cat is sleeping on the comfortable mat.", level: "easy" },
        { text: "Beautiful weather we are having today.", level: "medium" },
        { text: "Could you please tell me the way to the train station?", level: "medium" },
        { text: "Practice makes perfect when learning a new language.", level: "medium" },
        { text: "I would like to schedule an appointment for next week.", level: "medium" },
        { text: "Peter Piper picked a peck of pickled peppers.", level: "hard" },
        { text: "The entrepreneurial strategy yielded incredible global results.", level: "hard" },
        { text: "She sells seashells by the seashore.", level: "hard" }
    ];

    // Các biến quản lý danh sách ngẫu nhiên không trùng lặp
    let orderList = [];
    let currentPointer = 0;
    let currentPhraseIndex = 0;

    // Thiết lập Web Speech API
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói. Vui lòng sử dụng Google Chrome để trải nghiệm tốt nhất!");
    } else {
        const recognition = new SpeechRecognition();
        recognition.lang = 'en-US'; 
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;

        // DOM Elements
        const targetPhrase = document.getElementById('targetPhrase');
        const difficultyBadge = document.getElementById('difficultyBadge');
        const startBtn = document.getElementById('startBtn');
        const nextBtn = document.getElementById('nextBtn');
        const resultArea = document.getElementById('resultArea');
        const userTranscript = document.getElementById('userTranscript');
        const matchResult = document.getElementById('matchResult');
        const finalScore = document.getElementById('finalScore');

        // Hàm xáo trộn danh sách câu hỏi (Thuật toán Fisher-Yates)
        function generateRandomOrder() {
            orderList = [...Array(dataset.length).keys()]; // Tạo mảng [0, 1, 2...9]
            for (let i = orderList.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [orderList[i], orderList[j]] = [orderList[j], orderList[i]];
            }
            currentPointer = 0; // Reset con trỏ về vị trí đầu tiên của mảng đã trộn
        }

        // Hàm tải câu hỏi lên giao diện
        function loadPhrase() {
            currentPhraseIndex = orderList[currentPointer];
            const item = dataset[currentPhraseIndex];
            
            targetPhrase.innerText = item.text;
            difficultyBadge.innerText = item.level;
            difficultyBadge.className = "badge badge-" + item.level;
            
            // Dọn dẹp giao diện cho câu mới
            resultArea.style.display = "none";
            nextBtn.style.display = "none"; // Ẩn nút "Câu tiếp theo" đi, phải hoàn thành mới hiện lại
            startBtn.disabled = false;
        }

        // Sự kiện click nút "Bắt đầu nói"
        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.innerText = "Đang lắng nghe...";
            startBtn.disabled = true;
        });

        // Xử lý khi có kết quả trả về từ Google API
        recognition.onresult = (event) => {
            const speechResult = event.results[0][0].transcript;
            const confidence = event.results[0][0].confidence; 

            userTranscript.innerText = speechResult;
            
            const cleanTarget = cleanText(dataset[currentPhraseIndex].text);
            const cleanSpeech = cleanText(speechResult);

            // Tính điểm số
            const score = calculateScore(cleanTarget, cleanSpeech, confidence);
            displayResults(score);
        };

        recognition.onspeechend = () => {
            recognition.stop();
            startBtn.innerText = "Bắt đầu nói";
        };

        recognition.onerror = (event) => {
            alert("Không nhận diện được âm thanh hoặc lỗi thiết bị. Vui lòng thử lại!");
            startBtn.innerText = "Bắt đầu nói";
            startBtn.disabled = false;
        };

        // Sự kiện click nút "Câu tiếp theo"
        nextBtn.addEventListener('click', () => {
            currentPointer++;
            // Nếu đã đi hết 10 câu, tự động trộn lại bộ câu hỏi mới từ đầu
            if (currentPointer >= dataset.length) {
                alert("Chúc mừng! Bạn đã hoàn thành hết bộ câu hỏi. Hệ thống sẽ xáo trộn lượt mới!");
                generateRandomOrder();
            }
            loadPhrase();
        });

        // Các hàm bổ trợ xử lý dữ liệu chữ và tính điểm
        function cleanText(text) {
            return text.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
        }

        function calculateScore(target, speech, confidence) {
            const targetWords = target.split(' ');
            const speechWords = speech.split(' ');
            
            let matchedCount = 0;
            targetWords.forEach(word => {
                if (speechWords.includes(word)) matchedCount++;
            });

            const wordMatchRatio = matchedCount / targetWords.length;
            let finalScore = (wordMatchRatio * 0.6 + confidence * 0.4) * 100;
            
            if (speech === "") finalScore = 0;
            return Math.min(Math.max(Math.round(finalScore), 0), 100);
        }

        function displayResults(score) {
            resultArea.style.display = "block";
            finalScore.innerText = score + "%";
            finalScore.className = "score"; 

            if (score >= 85) {
                finalScore.classList.add('good');
                matchResult.innerText = "Xuất sắc! Phát âm cực chuẩn giọng Mỹ.";
            } else if (score >= 60) {
                finalScore.classList.add('average');
                matchResult.innerText = "Tạm ổn, cần chú ý thêm trọng âm và âm cuối.";
            } else {
                finalScore.classList.add('bad');
                matchResult.innerText = "Chưa đạt yêu cầu. Bạn nên đọc chậm và rõ ràng hơn.";
            }

            // [TÍNH NĂNG THÊM VÀO]: Hiện nút "Câu tiếp theo" sau khi đã có điểm số
            nextBtn.style.display = "inline-block";
            startBtn.disabled = true; // Khóa nút nói lại của câu cũ để hướng người dùng bấm tiếp tục
        }

        // Khởi động ứng dụng lần đầu
        generateRandomOrder();
        loadPhrase();
    }
</script>

</body>
</html>
